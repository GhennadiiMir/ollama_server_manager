# Docker Compose for macOS and Windows (Docker Desktop)
#
# Usage:
#   docker compose -f docker-compose.macos.yml up -d
#
# On Docker Desktop, network_mode: host is not supported.
# This file uses standard port mapping instead.
#
# Connecting to Ollama servers:
#   - Local Ollama (same machine): http://host.docker.internal:11434
#   - Remote Ollama servers:       use their IP address, e.g. http://192.168.1.100:11434
#
# Note: custom hostnames (e.g. VPN names, mDNS, Tailscale) won't resolve inside
# the Docker Desktop VM. Use IP addresses for remote servers in that case.

services:
  ollama-manager:
    build: .
    container_name: ollama-server-manager
    ports:
      - "9292:9292"
    restart: unless-stopped
    environment:
      - PORT=9292
      - PUMA_THREADS=5
      - WEB_CONCURRENCY=2
      # Rewrite localhost to host.docker.internal so the proxy can reach
      # Ollama running on the macOS host from inside the Docker Desktop VM.
      - LOCALHOST_ALIAS=host.docker.internal
    volumes:
      - ./data:/app/data
    # Ensures host.docker.internal resolves to the host machine
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9292/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
